<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Dark rounded background -->
  <rect width="512" height="512" rx="100" fill="#141414"/>
  <rect width="512" height="512" rx="100" fill="none" stroke="#FF6B35" stroke-width="3" stroke-opacity="0.3"/>
  <!-- Large white M -->
  <text x="256" y="320" text-anchor="middle" fill="white" font-family="'Space Grotesk', Arial Black, sans-serif" font-weight="900" font-size="340">M</text>
  <!-- Orange REPS text -->
  <text x="256" y="410" text-anchor="middle" fill="#FF6B35" font-family="'Space Grotesk', Arial, sans-serif" font-weight="700" font-size="90" letter-spacing="16">REPS</text>
  <!-- Orange underline -->
  <line x1="130" y1="430" x2="382" y2="430" stroke="#FF6B35" stroke-width="6" stroke-linecap="round"/>
</svg>
