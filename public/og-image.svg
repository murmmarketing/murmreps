<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0A0A0A"/>
  <!-- Horizontal logo centered -->
  <image href="/logo.png" x="300" y="180" width="600" height="140" preserveAspectRatio="xMidYMid meet"/>
  <!-- Tagline -->
  <text x="600" y="400" text-anchor="middle" fill="white" font-family="'Inter', sans-serif" font-weight="400" font-size="24">Find the best reps, all in one place.</text>
  <!-- Subtle accent line -->
  <line x1="450" y1="440" x2="750" y2="440" stroke="#FF6B35" stroke-width="3" stroke-opacity="0.4" stroke-linecap="round"/>
</svg>
